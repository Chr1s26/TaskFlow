version: "3"

services:

  backend:
    build: ./backend
    container_name: taskflow-backend
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: taskflow-frontend

  nginx:
    image: nginx:alpine
    container_name: taskflow-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend